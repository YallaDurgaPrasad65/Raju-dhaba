<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 620" width="100%" height="100%">
  <defs>
    <!-- Card Gradients with Transparency -->
    <linearGradient id="clientCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.9" />
    </linearGradient>
    <linearGradient id="edgeCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#022c22" stop-opacity="0.9" />
    </linearGradient>
    <linearGradient id="serverCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#2e1065" stop-opacity="0.9" />
    </linearGradient>
    <linearGradient id="dbCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#881337" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#4c0519" stop-opacity="0.9" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#38bdf8" flood-opacity="0.4" />
    </filter>
    <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#10b981" flood-opacity="0.4" />
    </filter>
    <filter id="purpleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#a855f7" flood-opacity="0.4" />
    </filter>
    <filter id="redGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#f43f5e" flood-opacity="0.4" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowCyan" markerWidth="14" markerHeight="10" refX="13" refY="5" orient="auto">
      <polygon points="0 0, 14 5, 0 10" fill="#38bdf8" />
    </marker>
    <marker id="arrowPurple" markerWidth="14" markerHeight="10" refX="13" refY="5" orient="auto">
      <polygon points="0 0, 14 5, 0 10" fill="#c084fc" />
    </marker>
    <marker id="arrowRed" markerWidth="14" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 14 5, 0 10" fill="#f43f5e" />
    </marker>
    
    <style>
      .font-main { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
      .title { font-size: 22px; font-weight: 800; fill: #f8fafc; }
      .subtitle { font-size: 16px; font-weight: 600; fill: #cbd5e1; }
      .pill-text { font-size: 14px; font-weight: 800; }
    </style>
  </defs>

  <!-- Transparent Background -->

  <!-- Header Title -->
  <text x="380" y="38" class="font-main" font-size="18" font-weight="900" fill="#38bdf8" letter-spacing="3" text-anchor="middle">SYSTEM ARCHITECTURE PIPELINE</text>

  <!-- ==================== 1. CLIENT BROWSER (TOP LEFT) ==================== -->
  <g transform="translate(30, 80)">
    <rect width="330" height="180" rx="22" fill="url(#clientCard)" stroke="#38bdf8" stroke-width="2.5" filter="url(#cyanGlow)" />
    <circle cx="50" cy="50" r="24" fill="#0284c7" fill-opacity="0.3" stroke="#38bdf8" stroke-width="1.5" />
    <text x="50" y="58" font-size="26" text-anchor="middle">💻</text>
    <text x="95" y="57" class="font-main title">Client App</text>
    
    <text x="40" y="105" class="font-main subtitle">• HTML5 Semantic UI</text>
    <text x="40" y="132" class="font-main subtitle">• Glassmorphism CSS</text>
    <text x="40" y="159" class="font-main subtitle">• Async Fetch API</text>
  </g>

  <!-- Arrow Client -> Edge -->
  <path d="M 360 170 L 415 170" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrowCyan)" />
  <rect x="365" y="135" width="45" height="24" rx="6" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5" />
  <text x="387" y="152" class="font-main pill-text" fill="#38bdf8" text-anchor="middle">HTTPS</text>

  <!-- ==================== 2. VERCEL EDGE CDN (TOP RIGHT) ==================== -->
  <g transform="translate(425, 80)">
    <rect width="305" height="180" rx="22" fill="url(#edgeCard)" stroke="#10b981" stroke-width="2.5" filter="url(#greenGlow)" />
    
    <circle cx="50" cy="50" r="24" fill="#059669" fill-opacity="0.3" stroke="#10b981" stroke-width="1.5" />
    <text x="50" y="58" font-size="26" text-anchor="middle">⚡</text>
    <text x="95" y="57" class="font-main title">Vercel Edge</text>

    <!-- Sub Box: Static CDN -->
    <g transform="translate(25, 85)">
      <rect width="255" height="75" rx="14" fill="#065f46" fill-opacity="0.8" stroke="#34d399" stroke-width="1.5" />
      <text x="20" y="30" class="font-main" font-size="16" font-weight="800" fill="#6ee7b7">📁 /public/* Assets</text>
      <text x="20" y="54" class="font-main" font-size="14" font-weight="700" fill="#a7f3d0">ZERO COLD-START CDN</text>
    </g>
  </g>

  <!-- Arrow Edge -> Express (VERTICAL DOWNWARD FOR MOBILE READABILITY) -->
  <path d="M 577 260 L 577 325" stroke="#c084fc" stroke-width="4" marker-end="url(#arrowPurple)" />
  <rect x="520" y="280" width="114" height="26" rx="8" fill="#0f172a" stroke="#c084fc" stroke-width="1.5" />
  <text x="577" y="298" class="font-main pill-text" fill="#c084fc" text-anchor="middle">🔀 /api/* Rewrite</text>

  <!-- ==================== 3. EXPRESS REST API (BOTTOM RIGHT) ==================== -->
  <g transform="translate(425, 340)">
    <rect width="305" height="180" rx="22" fill="url(#serverCard)" stroke="#a855f7" stroke-width="2.5" filter="url(#purpleGlow)" />
    
    <circle cx="50" cy="50" r="24" fill="#7c3aed" fill-opacity="0.3" stroke="#a855f7" stroke-width="1.5" />
    <text x="50" y="58" font-size="26" text-anchor="middle">🚀</text>
    <text x="95" y="57" class="font-main title">Express API</text>
    
    <text x="35" y="105" class="font-main subtitle">• /api/bookings Route</text>
    <text x="35" y="132" class="font-main subtitle">• Payload Validator Engine</text>
    <text x="35" y="159" class="font-main subtitle">• CORS &amp; JSON Middleware</text>
  </g>

  <!-- Arrow Express -> Storage (LEFTWARD TO STORAGE BOX) -->
  <path d="M 425 430 L 355 430" stroke="#f43f5e" stroke-width="4" stroke-dasharray="8, 8" marker-end="url(#arrowRed)" />
  <rect x="365" y="395" width="55" height="26" rx="6" fill="#0f172a" stroke="#f43f5e" stroke-width="1.5" />
  <text x="392" y="413" class="font-main pill-text" fill="#f43f5e" text-anchor="middle">⬇ I/O</text>

  <!-- ==================== 4. EXTERNAL /TMP STORAGE (BOTTOM LEFT) ==================== -->
  <g transform="translate(30, 340)">
    <rect width="320" height="180" rx="22" fill="url(#dbCard)" stroke="#f43f5e" stroke-width="2.5" filter="url(#redGlow)" />
    
    <circle cx="50" cy="50" r="24" fill="#e11d48" fill-opacity="0.3" stroke="#f43f5e" stroke-width="1.5" />
    <text x="50" y="58" font-size="26" text-anchor="middle">💾</text>
    <text x="95" y="57" class="font-main title" fill="#fecdd3">File Storage</text>
    
    <text x="35" y="105" class="font-main subtitle" fill="#fda4af">• bookings.json Persistence</text>
    <text x="35" y="132" class="font-main subtitle" fill="#fecdd3">• Atomic Temp-File Swaps</text>
    
    <!-- /tmp badge -->
    <rect x="35" y="145" width="70" height="26" rx="8" fill="#f43f5e" fill-opacity="0.5" stroke="#fda4af" stroke-width="1.5" />
    <text x="70" y="163" class="font-main pill-text" fill="#fff1f2" text-anchor="middle">/tmp</text>
  </g>

</svg>
